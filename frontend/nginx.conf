server {
  listen 80;

  # Dev-only relaxed CSP so external Jitsi scripts (eval, inline) work over HTTP.
  add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline' 'unsafe-eval'; script-src * data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src * ws: wss:; img-src * data: blob:; media-src * data: blob:; frame-src * data: blob:; style-src * 'unsafe-inline';" always;

  location / {
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  location /api {
    proxy_pass http://backend:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Reasonable timeouts to avoid ERR_NGROK_3004 and long-hanging sockets
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    send_timeout 30s;
  }
}
